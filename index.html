<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>컬러게임</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <!-- 카카오 SDK: KAKAO_APP_KEY를 js/game.js에 설정하세요 -->
  <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.2/kakao.min.js"
          integrity="sha384-TiCUE00h649CAMonG018J2ujOgDKW/kVWlChEuu4jK2vxfAAD0eZxzCKakxg55G4"
          crossorigin="anonymous"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ① 시작 화면 -->
  <section id="start-screen" class="screen">
    <span class="badge">Color Game</span>
    <h1>다른 색을<br /><span class="accent">찾아라</span></h1>
    <p class="subtitle">다른 색의 타일 하나를 찾아보세요!</p>
    <p class="tip"><span class="tip-label">Tip</span>레벨마다 제한시간 5초, 과연 30 레벨까지 갈 수 있을까요?</p>
    <div class="btn-row">
      <button id="btn-start" class="btn btn-primary">게임 시작</button>
      <button id="btn-to-rank-from-start" class="btn btn-secondary">순위표</button>
    </div>
  </section>

  <!-- ② 게임 화면 -->
  <section id="game-screen" class="screen hidden">
    <div class="hud">
      <div class="hud-box">
        <span class="hud-label">레벨</span>
        <span id="hud-level" class="hud-value">1 / 30</span>
      </div>
      <div class="hud-box">
        <span class="hud-label">점수</span>
        <span id="hud-score" class="hud-value">0</span>
      </div>
      <div class="hud-box">
        <span class="hud-label">시간</span>
        <span id="hud-timer" class="hud-value">5</span>
      </div>
    </div>

    <div class="progress-track">
      <div id="progress-bar"></div>
    </div>

    <div class="grid-wrap">
      <div id="grid"></div>
      <div id="feedback" class="feedback"></div>
    </div>
  </section>

  <!-- ③ 결과 화면 (타임오버 / 클리어 공통) -->
  <section id="result-screen" class="screen hidden">
    <span class="badge">Result</span>
    <h1 id="result-title">⏰ TIME OVER</h1>
    <p id="result-desc" class="subtitle"></p>

    <div class="result-card">
      <div class="result-row">
        <span>최종 점수</span>
        <span id="result-score" class="val">0</span>
      </div>
      <hr class="result-divider" />
      <div class="result-row">
        <span>최종 레벨</span>
        <span id="result-level" class="val">1</span>
      </div>
    </div>

    <!-- 30레벨 완료 시에만 표시 -->
    <div id="save-section" class="save-section hidden">
      <p id="result-save-guide" style="font-size:0.82rem;color:#6b7280;">닉네임을 입력하고 기록을 저장해 보세요</p>
      <p id="result-saved-msg" class="saved-msg hidden">✓ 기록이 저장되었습니다!</p>
      <div class="input-row">
        <input id="nickname-input" type="text" maxlength="6" placeholder="닉네임 (최대 6자)" />
        <button id="btn-save-score" class="btn btn-primary">저장</button>
      </div>
    </div>

    <div class="btn-row">
      <button id="btn-restart" class="btn btn-primary">다시하기</button>
      <button id="btn-kakao" class="btn btn-kakao">카카오톡 공유</button>
      <button id="btn-to-rank-from-result" class="btn btn-secondary">순위표</button>
    </div>
  </section>

  <!-- ④ 순위 화면 -->
  <section id="rank-screen" class="screen hidden">
    <span class="badge">Leaderboard</span>
    <h1>순위<span class="accent">표</span></h1>
    <div class="rank-table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>닉네임</th>
            <th>점수</th>
            <th>레벨</th>
          </tr>
        </thead>
        <tbody id="rank-body"></tbody>
      </table>
    </div>
    <button id="btn-rank-back" class="btn btn-secondary">돌아가기</button>
  </section>

  <script type="module" src="js/game.js"></script>
</body>
</html>
